name: PHP lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: PHP syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs

      - name: Check PHP syntax (theme)
        run: find themes/defitim -name '*.php' -exec php -l {} \;

      - name: Check PHP syntax (plugin)
        run: find plugins/defitim-helloasso -name '*.php' -exec php -l {} \;

      - name: WordPress coding standards
        run: |
          phpcs --standard=WordPress \
                --extensions=php \
                --ignore=vendor \
                --report=summary \
                themes/defitim/functions.php \
                themes/defitim/inc/ \
                plugins/defitim-helloasso/ \
                || true
