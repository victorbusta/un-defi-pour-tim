name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: rsync theme + plugin → VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy theme
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            themes/defitim/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/wp-content/themes/defitim/"

      - name: Deploy HelloAsso plugin
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            plugins/defitim-helloasso/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/html/wp-content/plugins/defitim-helloasso/"

      - name: Reload PHP-FPM
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "sudo systemctl reload php8.2-fpm && echo 'PHP-FPM reloaded'"
